<script>

function fmtDur(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m + ':' + String(s).padStart(2, '0');
}

function rankBadge(i) {
  if (i === 0) return '<span class="badge badge-gold">1st</span>';
  if (i === 1) return '<span class="badge badge-silver">2nd</span>';
  if (i === 2) return '<span class="badge badge-bronze">3rd</span>';
  return '<span class="rank">' + (i + 1) + '</span>';
}

function barCell(val, max, display) {
  const w = Math.round((val / max) * 120);
  return '<div class="bar-wrap"><div class="bar" style="width:' + w + 'px; min-width:2px;"></div><span class="val">' + display + '</span></div>';
}

function buildTable(bodyId, sorted, keyFn, displayFn, maxVal) {
  const tbody = document.getElementById(bodyId);
  tbody.innerHTML = sorted.map((v, i) => {
    const val = keyFn(v);
    return '<tr><td class="rank">' + rankBadge(i) + '</td>' +
      '<td class="title-cell">' + v.title + '</td>' +
      '<td class="r" style="font-size:12px; color:var(--color-text-secondary);">' + v.pub + '</td>' +
      '<td>' + barCell(val, maxVal, displayFn(v)) + '</td></tr>';
  }).join('');
}

const byViews = [...videos].sort((a, b) => b.views - a.views);
const byWatch = [...videos].sort((a, b) => b.watch - a.watch);
const bySubs = [...videos].sort((a, b) => b.subs - a.subs);
const byAvd = [...videos].sort((a, b) => b.avdSec - a.avdSec);
const byPct = [...videos].sort((a, b) => b.pct - a.pct);

buildTable('views-body', byViews, v => v.views, v => v.views.toLocaleString(), Math.max(...videos.map(v=>v.views)));
buildTable('watch-body', byWatch, v => v.watch, v => v.watch.toFixed(1) + ' hrs', Math.max(...videos.map(v=>v.watch)));
buildTable('subs-body', bySubs, v => v.subs, v => v.subs > 0 ? '+' + v.subs : '—', Math.max(...videos.map(v=>v.subs)));
buildTable('avd-body', byAvd, v => v.avdSec, v => fmtDur(v.avdSec), Math.max(...videos.map(v=>v.avdSec)));
buildTable('pct-body', byPct, v => v.pct, v => v.pct.toFixed(1) + '%', Math.max(...videos.map(v=>v.pct)));

function show(id) {
  ['views','watch','subs','avd','pct'].forEach(s => {
    document.getElementById(s).classList.toggle('section-hidden', s !== id);
  });
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['views','watch','subs','avd','pct'][i] === id);
  });
}
</script>
